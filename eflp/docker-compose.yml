services:
  neo4j:
    image: neo4j:5.9.0
    container_name: eflp_neo4j
    environment:
      - NEO4J_AUTH=neo4j/testuser
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.5.2
    container_name: eflp_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' >/dev/null"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  influxdb:
    image: influxdb:1.8
    container_name: eflp_influxdb
    environment:
      - INFLUXDB_DB=eflp
      - INFLUXDB_HTTP_AUTH_ENABLED=false
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb
    healthcheck:
      test: ["CMD-SHELL", "influx -execute 'SHOW DATABASES' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    container_name: eflp_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s

  ollama-model:
    image: ollama/ollama:latest
    container_name: eflp_ollama_model
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=granite4.1:8b
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull \"$${OLLAMA_MODEL}\""]
    restart: "no"

  eflp_app:
    build:
      context: ./eflp_app
      dockerfile: Dockerfile
    container_name: eflp_app
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=testuser
      - EFLP_SYSLOG_ENABLED=true
      - EFLP_SYSLOG_HOST=0.0.0.0
      - EFLP_SYSLOG_PORT=5514
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_INDEX=eflp-rag
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_DATABASE=eflp
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=granite4.1:8b
      - EFLP_RAG_ENABLED=true
      - EFLP_RAG_TOP_K=8
    depends_on:
      neo4j:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      ollama-model:
        condition: service_completed_successfully
    ports:
      - "5000:5000"
      - "5514:5514/udp"
    volumes:
      - eflp_uploads:/app/uploads

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: eflp_nginx
    depends_on:
      - eflp_app
    ports:
      - "8080:80"
      - "8443:8443"

volumes:
  neo4j_data:
  elasticsearch_data:
  influxdb_data:
  ollama_data:
  eflp_uploads:
